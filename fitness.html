    <div style={{ textAlign: "right" }}>
      <div style={{ fontSize: 9, color: "#444", letterSpacing: 2 }}>PROGRESS</div>
      <div style={{ fontSize: 28, fontWeight: 900, color: "#ff6b35", lineHeight: 1 }}>{week.week}<span style={{ fontSize: 12, color: "#444" }}>/8</span></div>
    </div>
  </div>

  {/* Progress bar */}
  <div style={{ padding: "0 16px 14px" }}>
    <div style={{ background: "#1a1a1a", borderRadius: 4, height: 3 }}>
      <div style={{ width: `${(week.week / 8) * 100}%`, background: "linear-gradient(90deg, #ff6b35, #ffe66d)", height: "100%", borderRadius: 4 }} />
    </div>
    <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}>
      <div style={{ fontSize: 9, color: "#444" }}>Week 1</div>
      <div style={{ fontSize: 9, color: "#444" }}>Week 8</div>
    </div>
  </div>

  {/* Days */}
  <div style={{ padding: "0 16px", display: "flex", flexDirection: "column", gap: 8 }}>
    {week.days.map((d, i) => {
      const color = typeColors[d.type];
      const isExpanded = expandedDay === i;
      const isRest = d.type === "rest";

      return (
        <div key={i} onClick={() => !isRest && setExpandedDay(isExpanded ? null : i)}
          style={{ background: "#131313", border: `1px solid ${isExpanded ? color.bg : "#1e1e1e"}`, borderLeft: `3px solid ${color.bg}`, borderRadius: 8, padding: "12px 14px", cursor: isRest ? "default" : "pointer", transition: "border-color 0.2s" }}>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ fontSize: 12, fontWeight: 900, color: "#444", width: 28 }}>{d.day}</div>
              <div>
                <div style={{ fontSize: 12, fontWeight: 700, color: color.bg }}>{d.label}</div>
                {d.run && <div style={{ fontSize: 10, color: "#555", marginTop: 1 }}>{d.run}</div>}
                {isRest && <div style={{ fontSize: 10, color: "#444", marginTop: 1 }}>Fast: {d.fast}</div>}
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              {!isRest && <div style={{ background: "#1e1e1e", border: "1px solid #2a2a2a", borderRadius: 4, padding: "2px 7px", fontSize: 9, color: "#666", letterSpacing: 1 }}>{d.fast}</div>}
              {!isRest && <div style={{ color: "#333", fontSize: 14 }}>{isExpanded ? "▲" : "▼"}</div>}
            </div>
          </div>

          {isExpanded && (
            <div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px solid #1e1e1e" }}>

              {/* Tab switcher */}
              <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
                {[
                  { key: "posture", label: "POSTURE/BALANCE" },
                  { key: "calisthenics", label: "CALISTHENICS" },
                  { key: "notes", label: "NOTES" },
                ].map(t => (
                  <button key={t.key} onClick={e => { e.stopPropagation(); setActiveTab(t.key); }} style={{
                    background: activeTab === t.key ? color.bg : "#1e1e1e",
                    color: activeTab === t.key ? "#000" : "#555",
                    border: "none", borderRadius: 4, padding: "5px 10px",
                    fontSize: 9, fontWeight: 700, letterSpacing: 1,
                    cursor: "pointer", fontFamily: "'Courier New', monospace"
                  }}>{t.label}</button>
                ))}
              </div>

              {activeTab === "posture" && (
                <div>
                  <div style={{ fontSize: 9, letterSpacing: 2, color: "#444", marginBottom: 8 }}>POSTURE + BALANCE WORK — EVERY SESSION</div>
                  {d.posture.map((ex, j) => (
                    <div key={j} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                      <div style={{ width: 5, height: 5, borderRadius: "50%", background: color.bg, flexShrink: 0 }} />
                      <div style={{ fontSize: 12, color: "#ccc" }}>{ex}</div>
                    </div>
                  ))}
                </div>
              )}

              {activeTab === "calisthenics" && (
                <div>
                  <div style={{ fontSize: 9, letterSpacing: 2, color: "#444", marginBottom: 8 }}>STRENGTH WORK</div>
                  {d.calisthenics.length > 0 ? d.calisthenics.map((ex, j) => (
                    <div key={j} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                      <div style={{ width: 5, height: 5, borderRadius: "50%", background: color.bg, flexShrink: 0 }} />
                      <div style={{ fontSize: 12, color: "#ccc" }}>{ex}</div>
                    </div>
                  )) : <div style={{ fontSize: 12, color: "#444" }}>Run only today.</div>}
                </div>
              )}

              {activeTab === "notes" && (
                <div>
                  <div style={{ fontSize: 9, letterSpacing: 2, color: "#444", marginBottom: 8 }}>COACH NOTES</div>
                  <div style={{ fontSize: 12, color: "#aaa", lineHeight: 1.7 }}>{d.notes}</div>
                  <div style={{ marginTop: 12, background: "#1a1a1a", borderRadius: 6, padding: "10px 12px" }}>
                    <div style={{ fontSize: 9, letterSpacing: 2, color: "#444", marginBottom: 4 }}>DAILY SEQUENCE</div>
                    <div style={{ fontSize: 11, color: "#666", lineHeight: 1.7 }}>
                      AM: Fasted run → wait 2hrs → protein+carb meal{"\n"}
                      Then: Posture work → Calisthenics (1-2hrs after meal)
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    })}
  </div>

  {/* Pull-up tracker */}
  <div style={{ padding: "20px 16px 0" }}>
    <div style={{ fontSize: 10, letterSpacing: 3, color: "#555", marginBottom: 10 }}>PULL-UP PROGRESSION</div>
    <div style={{ background: "#131313", border: "1px solid #1e1e1e", borderRadius: 8, padding: "14px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
        <div style={{ fontSize: 11, color: "#888" }}>Start: <span style={{ color: "#ff6b35", fontWeight: 700 }}>3 reps</span></div>
        <div style={{ fontSize: 11, color: "#888" }}>Week 8 target: <span style={{ color: "#4ecdc4", fontWeight: 700 }}>10 reps</span></div>
      </div>
      <div style={{ display: "flex", gap: 4 }}>
        {[3,3,4,5,6,7,8,10].map((v, i) => (
          <div key={i} style={{ flex: 1, textAlign: "center" }}>
            <div style={{ height: `${(v/10)*50}px`, background: i <= selectedWeek ? "#ff6b35" : "#1e1e1e", borderRadius: "3px 3px 0 0", marginBottom: 4, transition: "height 0.3s" }} />
            <div style={{ fontSize: 9, color: i <= selectedWeek ? "#ff6b35" : "#333" }}>{v}</div>
            <div style={{ fontSize: 8, color: "#333" }}>W{i+1}</div>
          </div>
        ))}
      </div>
    </div>
  </div>

  {/* Non-negotiables */}
  <div style={{ padding: "16px 16px 0" }}>
    <div style={{ fontSize: 10, letterSpacing: 3, color: "#555", marginBottom: 10 }}>NON-NEGOTIABLES</div>
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
      {[
        { e: "🍺", t: "Max 1 drink night/wk" },
        { e: "🚫", t: "No processed sugar" },
        { e: "💤", t: "Sleep 7+ hours" },
        { e: "💧", t: "100oz+ water daily" },
        { e: "🍤", t: "150g+ protein daily" },
        { e: "🧍", t: "Posture every session" },
      ].map((r, i) => (
        <div key={i} style={{ background: "#131313", border: "1px solid #1e1e1e", borderRadius: 8, padding: "10px 12px", fontSize: 11, color: "#777" }}>
          <span style={{ marginRight: 8 }}>{r.e}</span>{r.t}
        </div>
      ))}
    </div>
  </div>
</div>ReactDOM.createRoot(document.getElementById('root')).render(<FatLossV2 />);
</script>
</body>
</html>
